name: EAS Build Generator

on:
  workflow_dispatch:
    inputs:
      app_config_base64:
        description: 'Base64 encoded config.json'
        required: true
      app_id:
        description: 'Unique App ID for tracking'
        required: true
      build_profile:
        description: 'EAS Build Profile (development, preview, production)'
        required: false
        default: 'preview'
      platform:
        description: 'Platform to build (android, ios, all)'
        required: false
        default: 'android'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './expo-template/package-lock.json'

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        working-directory: ./expo-template
        run: npm install

      - name: Inject Generated config.json
        working-directory: ./expo-template
        run: |
          echo "Injecting configuration for app ID: ${{ github.event.inputs.app_id }}..."
          echo "${{ github.event.inputs.app_config_base64 }}" | base64 --decode > src/config/config.json
          echo "--- Injected config.json ---"
          cat src/config/config.json

      - name: Patch app.json display name
        working-directory: ./expo-template
        run: |
          EVENT_NAME=$(jq -r '.event.name // "My Event"' src/config/config.json)
          echo "Patching display name to: $EVENT_NAME"

          # IMPORTANT: Only patch .expo.name (the display name shown on device/store).
          # Do NOT change .expo.slug or .expo.extra.eas.projectId — EAS validates
          # that the slug matches the project registered on expo.dev. Changing it
          # causes: "Slug does not match" build failure.
          jq --arg name "$EVENT_NAME" \
             '.expo.name = $name' \
             app.json > app.json.tmp && mv app.json.tmp app.json

          echo "--- Patched app.json ---"
          cat app.json

      - name: Run EAS Build
        working-directory: ./expo-template
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Starting EAS Build for app: ${{ github.event.inputs.app_id }}"
          eas build \
            --platform ${{ github.event.inputs.platform }} \
            --profile ${{ github.event.inputs.build_profile }} \
            --non-interactive \
            --wait

          # Log build result
          BUILD_DATA=$(eas build:list --limit 1 --json --platform ${{ github.event.inputs.platform }})
          echo "Build Status : $(echo $BUILD_DATA | jq -r '.[0].status')"
          echo "Artifact URL : $(echo $BUILD_DATA | jq -r '.[0].artifacts.buildUrl')"
