<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI VideoGen - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div style="margin-bottom: 2rem;">
                <h2 style="color: var(--text-primary); margin-bottom: 0.5rem;">My Projects</h2>
                <div style="height: 1px; background: var(--border-color); margin-bottom: 1rem;"></div>
            </div>
            
            <nav id="projectList" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <!-- Project history items will go here -->
                <div style="color: var(--text-secondary); font-size: 0.9rem;">Loading history...</div>
            </nav>

            <div style="margin-top: auto;">
                <button class="btn" onclick="logout()" style="width: 100%; background: #334155;">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="container">
                <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h1>Create New Video</h1>
                    <div style="font-size: 0.9rem; color: var(--text-secondary);">Balance: Unlimited</div>
                </header>

                <div class="card mb-4" style="margin-bottom: 3rem;">
                    <form id="createTaskForm">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                            <label style="color: var(--text-secondary);">Describe your video</label>
                            <button type="button" id="enhanceBtn" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.8rem; background: var(--accent-hover);">✨ Enhance Prompt</button>
                        </div>
                        <textarea id="prompt" class="input-field" rows="3" placeholder="A futuristic city with flying cars at sunset..." required></textarea>
                        
                        <div style="display: flex; gap: 2rem; align-items: center; margin-bottom: 1rem;">
                            <div>
                                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Duration</label>
                                <select id="duration" class="input-field" style="width: 150px;">
                                    <option value="5">5 Seconds</option>
                                    <option value="10">10 Seconds</option>
                                    <option value="15">15 Seconds</option>
                                    <option value="30">30 Seconds</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn">Generate Video</button>
                    </form>
                </div>

                <h2 style="margin-bottom: 1rem;">Recent Generations</h2>
                <div id="videoGrid" class="video-grid">
                    <!-- Video Cards -->
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
