        className="bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent text-2xl font-bold rounded-xl px-8 py-4 hover:scale-105 transition-all duration-300"
      >

};

function App() {
  return (
    <div className="min-h-screen bg-gray-950 text-white overflow-x-hidden">
      <Hero />
      <Features />
      <Pricing />
      <Testimonial />
      <CTA />

    // Error Boundary to prevent white screens
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      render() {
        if (this.state.hasError) {
          return (
            <div className="p-8 text-white bg-red-900/20 min-h-screen font-mono">
              <h2 className="text-2xl text-red-400 mb-4">Preview Render Error</h2>
              <p>The AI generated code with a runtime error. You can fix this by typing in the chat (e.g. "Fix the undefined features map error")</p>
              <pre className="mt-4 p-4 bg-black/50 overflow-auto">{this.state.error.toString()}</pre>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
